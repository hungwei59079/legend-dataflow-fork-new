# legend_metadata_version: v1.4.1
allow_none_par: false
build_file_dbs: true
check_log_files: true
multiprocess: false
mutliprocess_mode: max_usage
max_processes: 1
pht_intier: psp

paths:
  sandbox_path: $PRODENV/sandbox
  tier_raw_blind: $PRODENV/generated/tier/raw-blind

  workflow: $PRODENV/workflow

  # metadata: local writable clone at $_/inputs (= repo root), checked out at v1.4.1
  # to match this fork. Generated tiers below stay on $PRODENV (read-only prod).
  metadata: $_/inputs
  config: $_/inputs/dataprod/config
  par_overwrite: $_/inputs/dataprod/overrides
  chan_map: $_/inputs/hardware/configuration
  detector_status: $_/inputs/datasets
  detector_db: $_/inputs/hardware/detectors

  tier: $PRODENV/generated/tier
  tier_daq: $PRODENV/generated/tier/daq
  tier_raw: $PRODENV/generated/tier/raw
  tier_tcm: $PRODENV/generated/tier/tcm
  tier_dsp: $PRODENV/generated/tier/dsp
  tier_hit: $PRODENV/generated/tier/hit
  tier_ann: $PRODENV/generated/tier/ann
  tier_evt: $PRODENV/generated/tier/evt
  tier_psp: $PRODENV/generated/tier/psp
  tier_pht: $PRODENV/generated/tier/pht
  tier_pan: $PRODENV/generated/tier/pan
  tier_pet: $PRODENV/generated/tier/pet
  tier_skm: $PRODENV/generated/tier/skm

  par: $PRODENV/generated/par
  par_raw: $PRODENV/generated/par/raw
  par_tcm: $PRODENV/generated/par/tcm
  par_dsp: $PRODENV/generated/par/dsp
  par_hit: $PRODENV/generated/par/hit
  par_evt: $PRODENV/generated/par/evt
  par_psp: $PRODENV/generated/par/psp
  par_pht: $PRODENV/generated/par/pht
  par_pet: $PRODENV/generated/par/pet

  plt: $PRODENV/generated/plt
  log: $PRODENV/generated/log

  tmp_plt: $PRODENV/generated/tmp/plt
  tmp_log: $PRODENV/generated/tmp/log
  tmp_benchmark: $PRODENV/generated/tmp/benchmark
  tmp_filelists: $PRODENV/generated/tmp/filelists
  tmp_par: $PRODENV/generated/tmp/par

  src: $PRODENV/software/python/src
  install: $PRODENV/.snakemake/legend-dataflow/venv

table_format:
  raw: ch{ch:07d}/raw
  dsp: ch{ch:07d}/dsp
  psp: ch{ch:07d}/dsp
  hit: ch{ch:07d}/hit
  pht: ch{ch:07d}/hit
  evt: "{grp}/evt"
  pet: "{grp}/evt"
  skm: "{grp}/skm"
  tcm: hardware_tcm_1

execenv:
  bare:
    env:
      PRODENV: $PRODENV
      LGDO_BOUNDSCHECK: "false"
      DSPEED_BOUNDSCHECK: "false"
      PYGAMA_PARALLEL: "false"
      PYGAMA_FASTMATH: "false"
      TQDM_DISABLE: "true"

  lngs:
    cmd: apptainer exec
    arg: /data2/public/prodenv/containers/legendexp_legend-base_latest_20241110203225.sif
    env:
      PRODENV: $PRODENV
      NUMBA_CACHE_DIR: $PRODENV/.snakemake/legend-dataflow/venv/cache
      LGDO_BOUNDSCHECK: "false"
      DSPEED_BOUNDSCHECK: "false"
      PYGAMA_PARALLEL: "false"
      PYGAMA_FASTMATH: "false"
      TQDM_DISABLE: "true"

  sator:
    cmd: apptainer exec
    arg: /mnt/atlas01/projects/scarf/software/containers/legendexp_legend-base_latest_20241110203225.sif
    env:
      PRODENV: $PRODENV
      NUMBA_CACHE_DIR: $PRODENV/.snakemake/numba-cache
      LGDO_BOUNDSCHECK: "false"
      DSPEED_BOUNDSCHECK: "false"
      PYGAMA_PARALLEL: "false"
      PYGAMA_FASTMATH: "false"
      TQDM_DISABLE: "true"

  nersc:
    cmd: shifter
    arg: --image legendexp/legend-base:latest
    env:
      PRODENV: $PRODENV
      NUMBA_CACHE_DIR: $PRODENV/.snakemake/legend-dataflow/venv/cache
      HDF5_USE_FILE_LOCKING: "false"
      LGDO_BOUNDSCHECK: "false"
      DSPEED_BOUNDSCHECK: "false"
      PYGAMA_PARALLEL: "false"
      PYGAMA_FASTMATH: "false"
      TQDM_DISABLE: "true"
